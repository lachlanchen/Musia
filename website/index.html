<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Fun Lazying Art bright media player for music, localized songs, MVs, short films, and synced multilingual lyrics.">
  <meta property="og:site_name" content="Fun Lazying Art">
  <meta property="og:type" content="music.song">
  <meta property="og:title" content="Fun Lazying Art">
  <meta property="og:description" content="Music, localized songs, MVs, short films, synced lyrics, pinyin, furigana, and public media pages.">
  <meta property="og:image" content="https://fun.lazying.art/assets/covers/rain-day-trilingual-poster-16x9.png">
  <meta property="og:url" content="https://fun.lazying.art">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Fun Lazying Art">
  <meta name="twitter:description" content="Music, localized songs, MVs, short films, synced lyrics, pinyin, furigana, and public media pages.">
  <meta name="twitter:image" content="https://fun.lazying.art/assets/covers/rain-day-trilingual-poster-16x9.png">
  <title>Fun Lazying Art</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <header class="site-header" aria-label="Site header">
      <a class="brand" href="https://fun.lazying.art" aria-label="Fun Lazying Art home">
        <span class="mark">F</span>
        <span>
          <strong>Fun Lazying Art</strong>
          <small>Music, films, and localized songs</small>
        </span>
      </a>
      <nav class="kind-nav" aria-label="Media categories">
        <button class="active" type="button" data-kind-filter="all">All</button>
        <button type="button" data-kind-filter="song">Music</button>
        <button type="button" data-kind-filter="localized-song">Localized</button>
        <button type="button" data-kind-filter="mv">MV</button>
        <button type="button" data-kind-filter="short-film">Short film</button>
        <button type="button" data-kind-filter="youtube-video">YouTube</button>
      </nav>
    </header>

    <section class="library-strip" aria-label="Media library">
      <label class="search-box">
        <span>Search</span>
        <input id="catalog-search" type="search" placeholder="Search songs, languages, tags" autocomplete="off">
      </label>
      <div id="media-library" class="media-library"></div>
    </section>

    <section class="hero-grid">
      <article class="player-card" aria-label="Media player">
        <div class="title-row">
          <img id="cover-thumb" class="cover-thumb" src="" alt="">
          <div>
            <span id="kind-label" class="eyebrow">Media</span>
            <h1 id="media-title">Loading</h1>
            <p id="media-subtitle">Loading media data.</p>
          </div>
        </div>

        <div class="stage">
          <img id="cover-art" class="cover-art" src="" alt="" decoding="async">
          <canvas id="visualizer" width="900" height="420" aria-label="Audio visualizer"></canvas>
          <video id="video" playsinline preload="metadata" aria-label="Video player"></video>
          <iframe id="external-player" title="External video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen hidden></iframe>
          <div class="stage-shade"></div>
          <div class="stage-copy">
            <p id="media-caption">Loading</p>
            <div id="stage-line" class="stage-line">Loading lyrics</div>
          </div>
        </div>

        <div class="transport">
          <button id="play" class="play-button" type="button" aria-label="Play or pause">
            <span id="play-symbol">▶</span>
          </button>
          <div class="time-readout">
            <span id="current-time">0:00</span>
            <div class="seek-wrap">
              <input id="seek" type="range" min="0" max="1000" value="0" aria-label="Seek">
              <div id="progress-fill" class="progress-fill"></div>
            </div>
            <span id="duration">0:00</span>
          </div>
        </div>

        <div class="meta-row">
          <span id="key-label">Key</span>
          <span id="bpm-label">BPM</span>
          <span id="now-chord">--</span>
          <span id="now-degree"></span>
        </div>
        <div id="asset-switcher" class="asset-switcher" aria-label="Playable versions"></div>
        <audio id="audio" preload="metadata"></audio>
      </article>

      <article class="lyrics-card" aria-label="Current lyrics">
        <div class="lyrics-head">
          <div>
            <span class="eyebrow">Current lyric</span>
            <h2 id="current-lyric-label">Lyrics</h2>
          </div>
          <div id="language-tabs" class="language-tabs" aria-label="Localization language"></div>
        </div>
        <div id="lyric-carousel" class="lyric-carousel">
          <div class="empty-state"><h2>Loading</h2><p>Media data is loading.</p></div>
        </div>
        <div id="chord-row" class="chord-row" aria-label="Chord timeline"></div>
      </article>
    </section>

    <section class="full-lyrics-section" aria-label="Full trilingual lyrics">
      <div class="section-title">
        <span class="eyebrow">Full lyrics</span>
        <h2>Three localized versions, line by line</h2>
      </div>
      <div id="full-lyrics" class="full-lyrics"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
