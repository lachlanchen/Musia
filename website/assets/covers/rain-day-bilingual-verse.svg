<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1600" role="img" aria-labelledby="title desc">
  <title id="title">Rain Day Bilingual Verse cover</title>
  <desc id="desc">Abstract rainy night window with city lights and waveform lines.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1015"/>
      <stop offset="0.48" stop-color="#172431"/>
      <stop offset="1" stop-color="#120f14"/>
    </linearGradient>
    <radialGradient id="teal" cx="0.25" cy="0.2" r="0.74">
      <stop offset="0" stop-color="#5fe2d6" stop-opacity="0.6"/>
      <stop offset="0.42" stop-color="#5fe2d6" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#5fe2d6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gold" cx="0.78" cy="0.38" r="0.6">
      <stop offset="0" stop-color="#f1c35d" stop-opacity="0.46"/>
      <stop offset="0.46" stop-color="#f1c35d" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#f1c35d" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="1600" fill="url(#bg)"/>
  <rect width="1600" height="1600" fill="url(#teal)"/>
  <rect width="1600" height="1600" fill="url(#gold)"/>
  <g opacity="0.72" filter="url(#blur)">
    <rect x="230" y="250" width="260" height="560" rx="24" fill="#6de4da" opacity="0.18"/>
    <rect x="910" y="310" width="240" height="470" rx="24" fill="#f1c35d" opacity="0.2"/>
    <rect x="1080" y="650" width="180" height="390" rx="24" fill="#ef7588" opacity="0.16"/>
  </g>
  <g opacity="0.34" stroke="#ffffff" stroke-width="2">
    <path d="M290 110 C240 420 180 620 120 1180"/>
    <path d="M462 90 C420 380 350 690 300 1310"/>
    <path d="M630 130 C570 460 530 800 460 1480"/>
    <path d="M840 40 C780 410 760 820 690 1520"/>
    <path d="M1030 100 C990 460 930 790 870 1490"/>
    <path d="M1230 70 C1190 450 1120 830 1040 1430"/>
    <path d="M1440 150 C1380 500 1320 850 1260 1510"/>
  </g>
  <g fill="none" stroke-linecap="round" filter="url(#softGlow)">
    <path d="M180 1070 C260 1010 330 1132 410 1075 S560 1018 640 1074 790 1130 880 1070 1040 1020 1125 1085 1285 1145 1420 1060" stroke="#5fe2d6" stroke-width="10" opacity="0.76"/>
    <path d="M180 1168 C280 1110 350 1228 445 1170 S625 1118 715 1172 870 1240 965 1165 1120 1120 1215 1170 1330 1220 1420 1162" stroke="#f1c35d" stroke-width="8" opacity="0.55"/>
    <path d="M210 1260 C310 1210 390 1318 500 1258 S690 1220 790 1272 920 1340 1030 1260 1190 1218 1320 1284" stroke="#ef7588" stroke-width="7" opacity="0.44"/>
  </g>
  <g opacity="0.2" fill="#ffffff">
    <circle cx="360" cy="410" r="8"/>
    <circle cx="1030" cy="485" r="7"/>
    <circle cx="1180" cy="765" r="5"/>
    <circle cx="710" cy="620" r="4"/>
    <circle cx="1360" cy="430" r="6"/>
  </g>
  <rect x="88" y="88" width="1424" height="1424" rx="44" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="3"/>
